name: Keep Supabase awake

on:
  schedule:
    # Every 3 days, comfortably inside Supabase's 7-day free-tier
    # inactivity window, with buffer for GitHub Actions' own scheduling
    # delays.
    - cron: "0 6 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the live Supabase project
        run: |
          curl -sf "${{ vars.SUPABASE_URL }}/rest/v1/meals?select=id&limit=1" \
            -H "apikey: ${{ vars.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.SUPABASE_ANON_KEY }}" \
            -o /dev/null -w "Supabase ping: HTTP %{http_code}\n"
