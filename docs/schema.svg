<svg viewBox="0 0 1500 1050" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8A8071"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="1050" fill="#FAF7F0"/>
  <text x="750" y="36" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="26" fill="#2B2620">Esstisch Demo — database schema</text>
  <text x="750" y="58" text-anchor="middle" font-size="13" font-style="italic" fill="#8A8071">10 tables in Supabase (Postgres). Lines show one-to-many relationships (hub table → many rows).</text>

  <!-- ============ helper-style table cards, hand-drawn ============ -->

  <!-- badge helper shapes are drawn inline per box below -->

  <!-- INGREDIENTS -->
  <rect x="80" y="100" width="280" height="200" rx="16" fill="#FFFFFF" stroke="#C08A2E" stroke-width="2"/>
  <rect x="238" y="112" width="110" height="22" rx="11" fill="#F7EEDD"/>
  <text x="293" y="127" text-anchor="middle" font-size="10" font-weight="700" fill="#8A5A1F">read-only</text>
  <text x="104" y="130" font-family="Georgia, serif" font-weight="700" font-size="15" fill="#C08A2E">ingredients</text>
  <line x1="104" y1="142" x2="336" y2="142" stroke="#C08A2E" stroke-opacity="0.3"/>
  <text x="104" y="164" font-size="12" font-weight="700" fill="#2B2620">id (PK)</text>
  <text x="104" y="184" font-size="12" fill="#2B2620">meal_id (FK → meals)</text>
  <text x="104" y="204" font-size="12" fill="#5C5648">category</text>
  <text x="104" y="224" font-size="12" fill="#5C5648">name</text>
  <text x="104" y="244" font-size="12" fill="#5C5648">quantity, unit</text>
  <text x="104" y="264" font-size="12" fill="#5C5648">est_cost</text>
  <text x="104" y="284" font-size="12" fill="#5C5648">notes</text>

  <!-- MEALS (hub) -->
  <rect x="420" y="70" width="340" height="230" rx="16" fill="#FFFFFF" stroke="#3F6B4A" stroke-width="2.5"/>
  <rect x="600" y="82" width="110" height="22" rx="11" fill="#F7EEDD"/>
  <text x="655" y="97" text-anchor="middle" font-size="10" font-weight="700" fill="#8A5A1F">read-only</text>
  <text x="444" y="118" font-family="Georgia, serif" font-weight="700" font-size="17" fill="#3F6B4A">meals</text>
  <text x="580" y="118" text-anchor="end" font-size="10" font-style="italic" fill="#8A8071">the hub</text>
  <line x1="444" y1="130" x2="736" y2="130" stroke="#3F6B4A" stroke-opacity="0.3"/>
  <text x="444" y="152" font-size="12.5" font-weight="700" fill="#2B2620">id (PK, text slug)</text>
  <text x="444" y="174" font-size="12.5" fill="#5C5648">name, cuisine</text>
  <text x="444" y="196" font-size="12.5" fill="#5C5648">complexity, prep_time, cook_time</text>
  <text x="444" y="218" font-size="12.5" fill="#5C5648">est_cost, health_rating</text>
  <text x="444" y="240" font-size="12.5" fill="#5C5648">protein_type, servings</text>
  <text x="444" y="262" font-size="12.5" fill="#5C5648">leftover_friendly, notes</text>
  <text x="444" y="284" font-size="12.5" font-style="italic" fill="#8A8071">recipe_steps (text array)</text>

  <!-- PEOPLE -->
  <rect x="1140" y="100" width="260" height="170" rx="16" fill="#FFFFFF" stroke="#5C7A99" stroke-width="2"/>
  <rect x="1268" y="112" width="110" height="22" rx="11" fill="#F7EEDD"/>
  <text x="1323" y="127" text-anchor="middle" font-size="10" font-weight="700" fill="#8A5A1F">read-only</text>
  <text x="1164" y="150" font-family="Georgia, serif" font-weight="700" font-size="15" fill="#5C7A99">people</text>
  <line x1="1164" y1="162" x2="1376" y2="162" stroke="#5C7A99" stroke-opacity="0.3"/>
  <text x="1164" y="184" font-size="12" font-weight="700" fill="#2B2620">id (PK)</text>
  <text x="1164" y="204" font-size="12" fill="#5C5648">name, initials, color</text>
  <text x="1164" y="224" font-size="12" fill="#2B2620">role ('parent' or 'kid')</text>
  <text x="1164" y="248" font-size="10.5" font-style="italic" fill="#8A8071">gates locking &amp; plan changes</text>

  <!-- WEEKLY_PLAN_DAYS -->
  <rect x="140" y="420" width="300" height="190" rx="16" fill="#FFFFFF" stroke="#B23A2E" stroke-width="2"/>
  <rect x="278" y="432" width="120" height="22" rx="11" fill="#EAF1EC"/>
  <text x="338" y="447" text-anchor="middle" font-size="10" font-weight="700" fill="#2E5C38">read-write</text>
  <text x="164" y="470" font-family="Georgia, serif" font-weight="700" font-size="15" fill="#B23A2E">weekly_plan_days</text>
  <line x1="164" y1="482" x2="416" y2="482" stroke="#B23A2E" stroke-opacity="0.3"/>
  <text x="164" y="504" font-size="12" font-weight="700" fill="#2B2620">id (PK)</text>
  <text x="164" y="524" font-size="12" fill="#5C5648">week_start, day_key</text>
  <text x="164" y="544" font-size="12" fill="#2B2620">meal_id (FK → meals)</text>
  <text x="164" y="564" font-size="12" fill="#2B2620">chosen_by (FK → people)</text>
  <text x="164" y="584" font-size="12" font-style="italic" fill="#8A8071">cooked_at = the history log</text>
  <text x="164" y="602" font-size="10.5" fill="#8A8071">(null = planned, set = cooked)</text>

  <!-- FAVOURITES -->
  <rect x="540" y="420" width="260" height="140" rx="16" fill="#FFFFFF" stroke="#8C6BAA" stroke-width="2"/>
  <rect x="638" y="432" width="120" height="22" rx="11" fill="#EAF1EC"/>
  <text x="698" y="447" text-anchor="middle" font-size="10" font-weight="700" fill="#2E5C38">read-write</text>
  <text x="564" y="470" font-family="Georgia, serif" font-weight="700" font-size="15" fill="#8C6BAA">favourites</text>
  <line x1="564" y1="482" x2="776" y2="482" stroke="#8C6BAA" stroke-opacity="0.3"/>
  <text x="564" y="504" font-size="12" font-weight="700" fill="#2B2620">id (PK)</text>
  <text x="564" y="524" font-size="12" fill="#2B2620">meal_id (FK → meals)</text>
  <text x="564" y="544" font-size="12" fill="#2B2620">person (FK → people)</text>

  <!-- MEAL_RATINGS -->
  <rect x="900" y="420" width="300" height="190" rx="16" fill="#FFFFFF" stroke="#2E9E8F" stroke-width="2"/>
  <rect x="1038" y="432" width="120" height="22" rx="11" fill="#EAF1EC"/>
  <text x="1098" y="447" text-anchor="middle" font-size="10" font-weight="700" fill="#2E5C38">read-write</text>
  <text x="924" y="470" font-family="Georgia, serif" font-weight="700" font-size="15" fill="#2E9E8F">meal_ratings</text>
  <line x1="924" y1="482" x2="1176" y2="482" stroke="#2E9E8F" stroke-opacity="0.3"/>
  <text x="924" y="504" font-size="12" font-weight="700" fill="#2B2620">id (PK)</text>
  <text x="924" y="524" font-size="12" fill="#2B2620">meal_id (FK → meals)</text>
  <text x="924" y="544" font-size="12" fill="#2B2620">person (FK → people)</text>
  <text x="924" y="564" font-size="12" fill="#5C5648">ease_rating, quality_rating (1-5)</text>
  <text x="924" y="584" font-size="12" fill="#5C5648">week_start, day_key</text>
  <text x="924" y="602" font-size="12" fill="#5C5648">created_at</text>

  <!-- Connections: MEALS -> three lower tables, routed via a clear horizontal band -->
  <path d="M540,300 L540,345 L290,345 L290,418" stroke="#8A8071" stroke-width="1.75" fill="none" marker-end="url(#arrow)"/>
  <path d="M590,300 L590,345 L670,345 L670,418" stroke="#8A8071" stroke-width="1.75" fill="none" marker-end="url(#arrow)"/>
  <path d="M640,300 L640,345 L1010,345 L1010,418" stroke="#8A8071" stroke-width="1.75" fill="none" marker-end="url(#arrow)"/>
  <!-- Connections: PEOPLE -> lower tables, routed via a second, lower horizontal band -->
  <path d="M1200,270 L1200,390 L370,390 L370,418" stroke="#8A8071" stroke-width="1.75" fill="none" marker-end="url(#arrow)"/>
  <path d="M1240,270 L1240,400 L730,400 L730,418" stroke="#8A8071" stroke-width="1.75" fill="none" marker-end="url(#arrow)"/>
  <path d="M1280,270 L1280,410 L1090,410 L1090,418" stroke="#8A8071" stroke-width="1.75" fill="none" marker-end="url(#arrow)"/>
  <!-- ingredients -> meals -->
  <path d="M360,185 L418,185" stroke="#8A8071" stroke-width="1.75" fill="none" marker-end="url(#arrow)"/>

  <!-- WEEK_LOCKS -->
  <rect x="140" y="890" width="320" height="130" rx="16" fill="#FFFFFF" stroke="#B23A2E" stroke-width="2"/>
  <rect x="298" y="902" width="120" height="22" rx="11" fill="#EAF1EC"/>
  <text x="358" y="917" text-anchor="middle" font-size="10" font-weight="700" fill="#2E5C38">read-write</text>
  <text x="164" y="940" font-family="Georgia, serif" font-weight="700" font-size="15" fill="#B23A2E">week_locks</text>
  <line x1="164" y1="952" x2="436" y2="952" stroke="#B23A2E" stroke-opacity="0.3"/>
  <text x="164" y="974" font-size="12" font-weight="700" fill="#2B2620">week_start (PK)</text>
  <text x="164" y="994" font-size="12" fill="#5C5648">locked (boolean)</text>
  <text x="164" y="1014" font-size="12" fill="#2B2620">locked_by (FK → people), locked_at</text>

  <!-- SHOPPING_LOCKS -->
  <rect x="500" y="890" width="320" height="130" rx="16" fill="#FFFFFF" stroke="#B23A2E" stroke-width="2"/>
  <rect x="658" y="902" width="120" height="22" rx="11" fill="#EAF1EC"/>
  <text x="718" y="917" text-anchor="middle" font-size="10" font-weight="700" fill="#2E5C38">read-write</text>
  <text x="524" y="940" font-family="Georgia, serif" font-weight="700" font-size="15" fill="#B23A2E">shopping_locks</text>
  <line x1="524" y1="952" x2="796" y2="952" stroke="#B23A2E" stroke-opacity="0.3"/>
  <text x="524" y="974" font-size="12" font-weight="700" fill="#2B2620">week_start (PK)</text>
  <text x="524" y="994" font-size="12" fill="#5C5648">locked (boolean)</text>
  <text x="524" y="1014" font-size="12" fill="#2B2620">locked_by (FK → people), locked_at</text>

  <!-- STANDALONE TABLES -->
  <rect x="140" y="700" width="280" height="150" rx="16" fill="#FFFFFF" stroke="#8A8071" stroke-width="1.75" stroke-dasharray="5,4"/>
  <rect x="238" y="712" width="120" height="22" rx="11" fill="#EAF1EC"/>
  <text x="298" y="727" text-anchor="middle" font-size="10" font-weight="700" fill="#2E5C38">read-write</text>
  <text x="164" y="750" font-family="Georgia, serif" font-weight="700" font-size="15" fill="#5C5648">shopping_checked</text>
  <line x1="164" y1="762" x2="396" y2="762" stroke="#8A8071" stroke-opacity="0.3"/>
  <text x="164" y="784" font-size="12" font-weight="700" fill="#2B2620">id (PK)</text>
  <text x="164" y="804" font-size="12" fill="#5C5648">week_start, item_key</text>
  <text x="164" y="824" font-size="12" fill="#5C5648">checked (boolean)</text>
  <text x="164" y="844" font-size="10.5" font-style="italic" fill="#8A8071">item_key = category|name|unit</text>

  <rect x="900" y="700" width="280" height="130" rx="16" fill="#FFFFFF" stroke="#8A8071" stroke-width="1.75" stroke-dasharray="5,4"/>
  <rect x="1038" y="712" width="110" height="22" rx="11" fill="#F7EEDD"/>
  <text x="1093" y="727" text-anchor="middle" font-size="10" font-weight="700" fill="#8A5A1F">read-only</text>
  <text x="924" y="750" font-family="Georgia, serif" font-weight="700" font-size="15" fill="#5C5648">settings</text>
  <line x1="924" y1="762" x2="1156" y2="762" stroke="#8A8071" stroke-opacity="0.3"/>
  <text x="924" y="784" font-size="12" font-weight="700" fill="#2B2620">id (PK, always 1)</text>
  <text x="924" y="804" font-size="12" fill="#5C5648">family_size</text>
  <text x="924" y="824" font-size="12" fill="#5C5648">language</text>

  <!-- LEGEND -->
  <rect x="1220" y="700" width="240" height="320" rx="16" fill="#FFFFFF" stroke="#C7BFAE" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="1244" y="730" font-family="Georgia, serif" font-weight="700" font-size="15" fill="#5C5648">How to read this</text>
  <line x1="1244" y1="742" x2="1436" y2="742" stroke="#C7BFAE"/>
  <text x="1244" y="764" font-size="11.5" fill="#5C5648">Solid arrows point from a table's</text>
  <text x="1244" y="780" font-size="11.5" fill="#5C5648">own id to the foreign key that</text>
  <text x="1244" y="796" font-size="11.5" fill="#5C5648">references it (1 → many).</text>
  <text x="1244" y="822" font-size="11.5" fill="#5C5648">Dashed borders = no other table</text>
  <text x="1244" y="838" font-size="11.5" fill="#5C5648">references this one.</text>
  <text x="1244" y="864" font-size="11.5" font-weight="700" fill="#8A5A1F">read-only badge</text>
  <text x="1244" y="880" font-size="11.5" fill="#5C5648">= anon visitors can view but</text>
  <text x="1244" y="896" font-size="11.5" fill="#5C5648">never write, in this public demo.</text>
  <text x="1244" y="920" font-size="11.5" font-weight="700" fill="#2E5C38">read-write badge</text>
  <text x="1244" y="936" font-size="11.5" fill="#5C5648">= visitors can write here, then a</text>
  <text x="1244" y="952" font-size="11.5" fill="#5C5648">daily job (pg_cron) resets it to a</text>
  <text x="1244" y="968" font-size="11.5" fill="#5C5648">clean baseline. See GOVERNANCE.md.</text>
  <text x="1244" y="994" font-size="11.5" fill="#5C5648">The real app instead grants full</text>
  <text x="1244" y="1010" font-size="11.5" fill="#5C5648">read-write to every table.</text>

</svg>
